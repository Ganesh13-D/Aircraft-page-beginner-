<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System</title>
    <link rel="stylesheet" href="system.css">
</head>
<body>
    
    <h1>Demo</h1>
    
    <div class="sim">

        <h2 id="status">Aircraft Status: READY</h2>

        <button onclick="takeOff()">Take Off</button>
        <button onclick="land()">Land</button>
        <button onclick="increaseSpeed()">Increase Speed</button>

        <p id="speed">Speed: 0 Km/h</p>
    </div>

    <div>
        <span>to -</span>  <a href="https://www.af.mil/About-Us/Fact-Sheets/Display/Article/1529726/c-17-globemaster-iii/">C-17 Globemaster III</a> <br>
        <span>to -</span>  <a href="https://www.boeing.com/defense/military-rotorcraft/ah-64-apache">AH-64 Apache helicopter</a><br>
        <span>to -</span>  <a href="https://www.af.mil/About-Us/Fact-Sheets/Display/Article/104505/f-16-fighting-falcon/">F-16 Fighting Falcon</a><br>
        <span>to -</span>  <a href="https://www.af.mil/About-Us/Fact-Sheets/Display/Article/104506/f-22-raptor/">F-22 Raptor</a><br>
        <span>to -</span>  <a href="https://en.wikipedia.org/wiki/Pratt_%26_Whitney_F135">F-135 lightning</a><br>
        <span>to -</span>  <a href="https://en.wikipedia.org/wiki/Sukhoi_Su-57">Sukhoi Su-57</a><br>
        <span>to -</span>  <a href="https://shieldagency.fandom.com/wiki/Quinjet">Quinjet</a><br>
        <span>to -</span>  <a href="https://airandspace.si.edu/collection-objects/lockheed-sr-71-blackbird/nasm_A19920072000">The Lockheed SR-71 Blackbird</a><br>
        <span>to -</span>  <a href="https://www.af.mil/About-Us/Fact-Sheets/Display/Article/104465/b-52h-stratofortress/">Boeing B-52 Stratofortress</a><br>

    </div>

    <script>
        let speed = 0;

    function takeOff(){
        document.getElementById("status").textContent = "Aircraft Status: IN AIR";
    }

    function land(){
        document.getElementById("status").textContent = "Aircraft Status: LANDED";
        speed = 0;
        document.getElementById("speed").textContent = "Speed: 0 km/h";
    }

    function increaseSpeed(){
        speed += 100;
        document.getElementById("speed").textContent = "Speed: " + speed + " km/h";
    }
    </script>
</body> 
</html>
